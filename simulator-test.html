<!DOCTYPE html>
<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#080E1A;--navy2:#0C1527;--navy3:#111D35;--card:#0E1A2E;--blue:#3B82F6;--blue2:#3B82F6;--blue3:#1D4ED8;--w:#fff;--w80:rgba(255,255,255,0.8);--w65:rgba(255,255,255,0.65);--w25:rgba(255,255,255,0.25);--bd:rgba(255,255,255,0.08);--bdb:rgba(37,99,235,0.3);--fd:'Bebas Neue',sans-serif;--fb:'Plus Jakarta Sans',sans-serif;--green:#22C55E;--amber:#F59E0B;--red:#EF4444}
body{font-family:var(--fb);background:var(--navy);color:var(--w);min-height:100vh}
nav{position:sticky;top:0;z-index:200;display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 52px;height:64px;background:rgba(8,15,30,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd)}
.nlogo{font-family:var(--fd);font-size:21px;letter-spacing:4px;color:var(--w);text-decoration:none;display:inline-flex;align-items:center}.nlogo span{color:var(--blue2)}
.nbtn{background:var(--blue);color:var(--w);border:none;padding:9px 20px;border-radius:8px;font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
footer{background:var(--navy);border-top:1px solid rgba(255,255,255,0.06)}
.footer-bottom{max-width:1260px;margin:0 auto;padding:16px 52px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;font-size:11px;color:rgba(255,255,255,0.3)}
@media(max-width:640px){nav{padding:0 16px}.footer-bottom{padding:14px 20px}}
</style>
</head>
<body>

<nav>

  </a>
  <div></div>

</nav>

<main>

</main>

<footer>
